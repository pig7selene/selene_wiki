site_name: Selene Wiki
site_description: 个人刷题记录
site_url: https://pig7selene.github.io/selene_wiki/

theme:
  name: material
  language: zh
  features:
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 前言: index.md

  - 随机过程:
      - 前言: stochastic-process/index.md
      - 笔记:
          - 有限状态马尔可夫链: stochastic-process/notes/finite-state-Markov-chain.md
      - 习题: stochastic-process/exercises.md

  - 操作系统:
      - 前言: operating-system/index.md
      - 笔记: operating-system/notes.md
      - 习题解答: operating-system/exercises.md

  - 算法竞赛:
      - 前言: competitive-programming/index.md
      - 笔记:
          - 数学:
              - 数论: competitive-programming/notes/math/shulun.md
      - 习题解答: competitive-programming/exercises.md